receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu:
      memory:
      disk:
      filesystem:
      network:

  prometheus:
    config:
      scrape_configs:
        - job_name: evy-api-gateway
          metrics_path: /metrics
          static_configs:
            - targets: ["api-gateway:8000"]
        - job_name: evy-sms-gateway
          metrics_path: /metrics
          static_configs:
            - targets: ["sms-gateway:8001"]
        - job_name: evy-message-router
          metrics_path: /metrics
          static_configs:
            - targets: ["message-router:8002"]
        - job_name: evy-llm-inference
          metrics_path: /metrics
          static_configs:
            - targets: ["llm-inference:8003"]
        - job_name: evy-rag-service
          metrics_path: /metrics
          static_configs:
            - targets: ["rag-service:8004"]
        - job_name: evy-privacy-filter
          metrics_path: /metrics
          static_configs:
            - targets: ["privacy-filter:8005"]

processors:
  batch:
  memory_limiter:
    check_interval: 5s
    limit_mib: 256
    spike_limit_mib: 64
  resource:
    attributes:
      - key: service.namespace
        value: evy
        action: upsert
      - key: deployment.environment
        value: local-prehardware
        action: upsert

exporters:
  debug:
    verbosity: basic
  file:
    path: /logs/otel/evy-otel.json
  prometheus:
    endpoint: 0.0.0.0:9464

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [debug, file]
    metrics:
      receivers: [otlp, hostmetrics, prometheus]
      processors: [memory_limiter, resource, batch]
      exporters: [debug, file, prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [debug, file]
