# lilEVY core service profile.
#
# This file uses real Python service entrypoints and intentionally omits
# hardware device mounts. Add a local override for /dev/ttyUSB*, /dev/spidev*,
# GPIO, and power telemetry once the target HATs are confirmed.
services:
  api-gateway:
    build:
      context: .
      dockerfile: backend/Dockerfile.lilevy
    command: python -m uvicorn backend.api_gateway.main:app --host 0.0.0.0 --port 8080
    environment:
      - API_GATEWAY_PORT=8080
      - SMS_GATEWAY_URL=http://sms-gateway:8000
      - MESSAGE_ROUTER_URL=http://message-router:8001
      - LLM_INFERENCE_URL=http://tiny-llm:8002
      - RAG_SERVICE_URL=http://local-rag:8003
      - PRIVACY_FILTER_URL=http://privacy-filter:8004
    ports:
      - "${LILEVY_API_PORT:-18080}:8080"
    depends_on:
      sms-gateway:
        condition: service_healthy
      message-router:
        condition: service_healthy
      tiny-llm:
        condition: service_healthy
      local-rag:
        condition: service_healthy
      privacy-filter:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  sms-gateway:
    build:
      context: .
      dockerfile: backend/Dockerfile.lilevy
    command: python -m uvicorn backend.services.sms_gateway.main:app --host 0.0.0.0 --port 8000
    environment:
      - SMS_GATEWAY_PORT=8000
      - MESSAGE_ROUTER_URL=http://message-router:8001
      - GSM_DEVICE=${GSM_DEVICE:-/dev/ttyUSB0}
      - GSM_BAUD_RATE=${GSM_BAUD_RATE:-115200}
      - SMS_FORWARD_MAX_RETRIES=${SMS_FORWARD_MAX_RETRIES:-3}
      - SMS_ROUTER_TIMEOUT_SECONDS=${SMS_ROUTER_TIMEOUT_SECONDS:-15}
    ports:
      - "${LILEVY_SMS_PORT:-18000}:8000"
    volumes:
      - ./data/lilevy:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    restart: unless-stopped

  message-router:
    build:
      context: .
      dockerfile: backend/Dockerfile.lilevy
    command: python -m uvicorn backend.services.message_router.main:app --host 0.0.0.0 --port 8001
    environment:
      - MESSAGE_ROUTER_PORT=8001
      - SMS_GATEWAY_URL=http://sms-gateway:8000
      - LLM_SERVICE_URL=http://tiny-llm:8002
      - RAG_SERVICE_URL=http://local-rag:8003
      - PRIVACY_FILTER_URL=http://privacy-filter:8004
      - LLM_MAX_INFLIGHT_REQUESTS=${LLM_MAX_INFLIGHT_REQUESTS:-2}
      - LLM_REQUEST_TIMEOUT_SECONDS=${LLM_REQUEST_TIMEOUT_SECONDS:-20}
    ports:
      - "${LILEVY_ROUTER_PORT:-18001}:8001"
    depends_on:
      tiny-llm:
        condition: service_healthy
      local-rag:
        condition: service_healthy
      privacy-filter:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    restart: unless-stopped

  tiny-llm:
    build:
      context: .
      dockerfile: backend/Dockerfile.lilevy
    command: python -m uvicorn backend.services.llm_inference.main:app --host 0.0.0.0 --port 8002
    environment:
      - LLM_INFERENCE_PORT=8002
      - LLM_PROVIDER=${LLM_PROVIDER:-bitnet}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-bitnet-b1.58-2B-4T}
      - BITNET_MODEL=${BITNET_MODEL:-bitnet-b1.58-2B-4T}
      - BITNET_CPP_DIR=${BITNET_CPP_DIR:-/opt/bitnet.cpp}
      - BITNET_MODEL_PATH=${BITNET_MODEL_PATH:-/models/bitnet/BitNet-b1.58-2B-4T/ggml-model-i2_s.gguf}
      - BITNET_THREADS=${BITNET_THREADS:-2}
      - BITNET_CONTEXT_TOKENS=${BITNET_CONTEXT_TOKENS:-512}
      - BITNET_N_PREDICT=${BITNET_N_PREDICT:-80}
      - BITNET_ALLOW_FALLBACK=${BITNET_ALLOW_FALLBACK:-false}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - LLM_AUTO_PULL_MODELS=${LLM_AUTO_PULL_MODELS:-false}
      - LLM_MAX_LOADED_MODELS=${LLM_MAX_LOADED_MODELS:-2}
    ports:
      - "${LILEVY_LLM_PORT:-18002}:8002"
    volumes:
      - ./models/tiny:/models
      - ./models/bitnet:/models/bitnet
      - ./third_party/BitNet:/opt/bitnet.cpp
      - ./data/lilevy:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health', timeout=2).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  local-rag:
    build:
      context: .
      dockerfile: backend/Dockerfile.lilevy
    command: python -m uvicorn backend.services.rag_service.main:app --host 0.0.0.0 --port 8003
    environment:
      - RAG_SERVICE_PORT=8003
      - CHROMA_PERSIST_DIR=/data/chroma
      - EMBEDDING_CACHE_DIR=/data/models/embedding_cache
      - RAG_MIN_SIMILARITY=${RAG_MIN_SIMILARITY:-0.5}
      - RAG_CHUNK_SIZE_CHARS=${RAG_CHUNK_SIZE_CHARS:-600}
      - RAG_CHUNK_OVERLAP_CHARS=${RAG_CHUNK_OVERLAP_CHARS:-120}
    ports:
      - "${LILEVY_RAG_PORT:-18003}:8003"
    volumes:
      - ./data/lilevy/knowledge:/data/lilevy_knowledge
      - ./data/lilevy/chroma:/data/chroma
      - ./data/lilevy/models:/data/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health', timeout=2).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  privacy-filter:
    build:
      context: .
      dockerfile: backend/Dockerfile.lilevy
    command: python -m uvicorn backend.services.privacy_filter.main:app --host 0.0.0.0 --port 8004
    environment:
      - PRIVACY_FILTER_PORT=8004
      - MAX_SMS_PER_MINUTE=${MAX_SMS_PER_MINUTE:-10}
      - MAX_SMS_PER_HOUR=${MAX_SMS_PER_HOUR:-100}
    ports:
      - "${LILEVY_PRIVACY_PORT:-18004}:8004"
    volumes:
      - ./data/lilevy/privacy:/data/privacy_filter
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/health', timeout=2).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

networks:
  default:
    name: lilevy-network
