# lilEVY Deployment Configuration
# Edge SMS Node - Raspberry Pi 4 + GSM HAT + Solar Power
version: '3.8'

services:
  # lilEVY Core Services
  sms-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile.lilevy
    container_name: lilevy-sms-gateway
    ports:
      - "8000:8000"
    environment:
      - NODE_TYPE=lilevy
      - NODE_ID=lilevy-001
      - GSM_DEVICE=/dev/ttyUSB0
      - GSM_BAUD_RATE=115200
      - LOG_LEVEL=INFO
      - LLM_PROVIDER=ollama
      - DEFAULT_MODEL=tinyllama
      - MESSAGE_ROUTER_URL=http://message-router:8001
      - SMS_INBOUND_QUEUE_MAXSIZE=500
      - SMS_OUTBOUND_QUEUE_MAXSIZE=1000
      - SMS_FORWARD_MAX_RETRIES=3
      - SMS_ROUTER_TIMEOUT_SECONDS=15
    volumes:
      - ./data/lilevy:/data
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
      - /dev/ttyUSB1:/dev/ttyUSB1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - lilevy-network
    cpus: 1.0
    mem_limit: 512m

  message-router:
    build:
      context: ./backend
      dockerfile: Dockerfile.lilevy
    container_name: lilevy-message-router
    ports:
      - "8001:8001"
    environment:
      - NODE_TYPE=lilevy
      - NODE_ID=lilevy-001
      - SMS_GATEWAY_URL=http://sms-gateway:8000
      - LLM_SERVICE_URL=http://tiny-llm:8002
      - RAG_SERVICE_URL=http://local-rag:8003
      - PRIVACY_FILTER_URL=http://privacy-filter:8004
      - SMS_GATEWAY_URL=http://sms-gateway:8000
      - LLM_MAX_INFLIGHT_REQUESTS=2
      - LLM_REQUEST_TIMEOUT_SECONDS=20
      - LOG_LEVEL=INFO
      - LLM_PROVIDER=ollama
      - DEFAULT_MODEL=tinyllama
    depends_on:
      sms-gateway:
        condition: service_healthy
      tiny-llm:
        condition: service_healthy
      local-rag:
        condition: service_healthy
      privacy-filter:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      - lilevy-network
    cpus: 1.0
    mem_limit: 512m

  tiny-llm:
    build:
      context: ./backend
      dockerfile: Dockerfile.lilevy
    container_name: lilevy-tiny-llm
    ports:
      - "8002:8002"
    environment:
      - NODE_TYPE=lilevy
      - NODE_ID=lilevy-001
      - MODEL_TYPE=tiny
      - DEFAULT_MODEL=tinyllama
      - BITNET_MODEL=bitnet-2b
      - MAX_TOKENS=512
      - RESPONSE_TIME_TARGET=10
      - LOG_LEVEL=INFO
      - LLM_PROVIDER=ollama
      - LLM_MAX_INFLIGHT_REQUESTS=2
      - LLM_MAX_LOADED_MODELS=2
      - LLM_REQUEST_TIMEOUT_SECONDS=20
    volumes:
      - ./models/tiny:/models
      - ./data/lilevy:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - lilevy-network
    cpus: 2.0
    mem_limit: 2g

  local-rag:
    build:
      context: ./backend
      dockerfile: Dockerfile.lilevy
    container_name: lilevy-local-rag
    ports:
      - "8003:8003"
    environment:
      - NODE_TYPE=lilevy
      - NODE_ID=lilevy-001
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - MAX_DOCUMENTS=10000
      - CACHE_SIZE_MB=500
      - LOG_LEVEL=INFO
      - EMBEDDING_CACHE_DIR=/data/models/embedding_cache
      - RAG_MIN_SIMILARITY=0.5
      - RAG_CHUNK_SIZE_CHARS=600
      - RAG_CHUNK_OVERLAP_CHARS=120
    volumes:
      - ./data/lilevy/knowledge:/data/lilevy_knowledge
      - ./data/lilevy/chroma:/data/chroma
      - ./data/lilevy/models:/data/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - lilevy-network
    cpus: 1.0
    mem_limit: 1g

  privacy-filter:
    build:
      context: ./backend
      dockerfile: Dockerfile.lilevy
    container_name: lilevy-privacy-filter
    ports:
      - "8004:8004"
    environment:
      - NODE_TYPE=lilevy
      - NODE_ID=lilevy-001
      - MAX_SMS_PER_MINUTE=10
      - MAX_SMS_PER_HOUR=100
      - LOG_LEVEL=INFO
    volumes:
      - ./data/lilevy/privacy:/data/privacy_filter
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - lilevy-network

  # lilEVY Communication Services
  node-communication:
    build:
      context: ./backend
      dockerfile: Dockerfile.lilevy
    container_name: lilevy-node-communication
    ports:
      - "8005:8005"
    environment:
      - NODE_TYPE=lilevy
      - NODE_ID=lilevy-001
      - PEER_DISCOVERY=true
      - MESH_NETWORK=true
      - SYNC_INTERVAL_HOURS=24
      - LORA_FREQUENCY_MHZ=915.0
      - LORA_CS_PIN=25
      - LORA_DIO0_PIN=4
      - LORA_RESET_PIN=17
      - DEPLOYMENT_REGION=us
      - GPS_DEVICE=/dev/ttyAMA0
      - LOG_LEVEL=INFO
    depends_on:
      local-rag:
        condition: service_healthy
    devices:
      - /dev/spidev0.0:/dev/spidev0.0
      - /dev/ttyAMA0:/dev/ttyAMA0
    volumes:
      - /sys/class/gpio:/sys/class/gpio
      - ./data/lilevy/telemetry:/data/telemetry
    privileged: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os; print('ok')"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - lilevy-network

  # lilEVY Monitoring
  monitoring:
    build:
      context: ./backend
      dockerfile: Dockerfile.lilevy
    container_name: lilevy-monitoring
    ports:
      - "9090:9090"
    environment:
      - NODE_TYPE=lilevy
      - NODE_ID=lilevy-001
      - METRICS_ENABLED=true
      - LOG_LEVEL=INFO
    volumes:
      - ./data/lilevy/metrics:/data/metrics
    restart: unless-stopped
    networks:
      - lilevy-network

networks:
  lilevy-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  lilevy-data:
    driver: local
  lilevy-models:
    driver: local
